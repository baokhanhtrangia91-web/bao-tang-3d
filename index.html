<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảo Tàng Nghệ Thuật 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }

        canvas#bg { display: block; width: 100vw; height: 100vh; }

        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center;
            color: white; z-index: 10; font-family: sans-serif; transition: opacity 0.5s;
        }
        #instructions.hidden { opacity: 0; pointer-events: none; }
        .content { text-align: center; border: 2px solid #d4af37; padding: 40px; max-width: 400px; }
        .content h1 { font-size: 1.6rem; margin-bottom: 16px; color: #d4af37; }
        .content p  { margin-bottom: 8px; line-height: 1.6; }
        #start-btn { background: #d4af37; border: none; padding: 12px 28px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        #start-btn:hover { background: #f0c842; }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 16px; height: 16px; pointer-events: none; display: none;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.8); }
        #crosshair::before { width: 2px; height: 100%; left: 7px; top: 0; }
        #crosshair::after  { width: 100%; height: 2px; top: 7px; left: 0; }

        #screenshot-btn {
            position: absolute; top: 20px; right: 20px; background: rgba(0, 0, 0, 0.7);
            color: #fff; border: 1px solid #d4af37; padding: 10px 16px; font-weight: bold; cursor: pointer; z-index: 5;
        }
        #screenshot-btn:hover { background: #d4af37; color: #000; }
        
        #coords-ui {
            position: absolute; bottom: 20px; left: 20px; background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff00; color: #00ff00; padding: 8px 15px; font-family: monospace; z-index: 5; display: none;
        }

        /* --- BẢNG THÔNG TIN TRANH (Giữa màn hình) --- */
        #art-description {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85); color: #fff; border: 1px solid #d4af37;
            padding: 24px; max-width: 480px; font-family: sans-serif; display: none;
            text-align: center; z-index: 15; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #art-title { font-size: 1.4rem; color: #d4af37; margin-bottom: 12px; font-weight: bold; }
        #art-text  { font-size: 1.05rem; line-height: 1.6; }

        /* --- PHỤ ĐỀ (Dưới cùng màn hình) --- */
        #subtitle-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; pointer-events: none; z-index: 20; display: none;
        }
        #subtitle-text {
            background-color: rgba(0, 0, 0, 0.6); color: #fff; padding: 12px 24px;
            border-radius: 8px; font-size: 1.3rem; font-family: sans-serif; 
            display: inline-block; text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>

    <div id="instructions">
        <div class="content">
            <h1>🏛️ BẢO TÀNG NGHỆ THUẬT VIRTUAL</h1>
            <p>Di chuyển: <b>W, A, S, D</b></p>
            <p>Nhìn xung quanh: <b>Di chuyển chuột</b></p>
            <p>Chạy: <b>Shift</b> | Ngồi: <b>Ctrl</b> | Nhảy: <b>Space</b> | Zoom: <b>Z</b></p>
            <p>Thoát: <b>ESC</b></p>
            <button id="start-btn">KHÁM PHÁ NGAY</button>
        </div>
    </div>

    <div id="coords-ui">X: 0.00 | Y: 0.00 | Z: 0.00</div>
    <div id="crosshair"></div>

    <button id="screenshot-btn" title="Phím tắt: R">📷 Chụp ảnh (R)</button>

    <div id="subtitle-container"><span id="subtitle-text"></span></div>

    <div id="art-description">
        <div id="art-title"></div>
        <div id="art-text"></div>
    </div>

    <audio id="art-audio" style="display: none;"></audio>

    
    <script type="module" src="/main.js"></script>
</body>
</html>
